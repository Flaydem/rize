services:
  - type: web
    name: rize
    runtime: node
    plan: free
    buildCommand: npm ci && node ace build --ignore-ts-errors && cd build && npm ci --omit=dev
    startCommand: cd build && node bin/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3333
      - key: SESSION_DRIVER
        value: cookie
      - key: LOG_LEVEL
        value: info
      - key: APP_KEY
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_DATABASE
        sync: false
      - key: DB_SSL
        value: "true"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
